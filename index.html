```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service CRM Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f3f4f6;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:#111827;
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
margin-bottom:30px;
color:#00c3ff;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:15px;
margin-bottom:10px;
background:#1f2937;
border-radius:8px;
cursor:pointer;
}

/* MAIN */

.main{
margin-left:240px;
padding:20px;
width:100%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:30px;
font-weight:bold;
}

.form-section{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

table th{
background:#111827;
color:white;
padding:15px;
text-align:left;
}

table td{
padding:15px;
border-bottom:1px solid #ddd;
}

.status{
padding:5px 10px;
border-radius:5px;
color:white;
font-size:12px;
}

.open{
background:red;
}

.pending{
background:orange;
}

.progress{
background:blue;
}

.closed{
background:green;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>SERVICE CRM</h2>

<ul>
<li>Dashboard</li>
<li>Customers</li>
<li>Tickets</li>
<li>Reports</li>
</ul>

</div>

<!-- MAIN -->

<div class="main">

<h1 style="margin-bottom:20px;">
Service CRM Dashboard
</h1>

<!-- DASHBOARD CARDS -->

<div class="cards">

<div class="card">
<h3>Total Tickets</h3>
<p id="totalTickets">0</p>
</div>

<div class="card">
<h3>Open Tickets</h3>
<p id="openTickets">0</p>
</div>

<div class="card">
<h3>Pending Tickets</h3>
<p id="pendingTickets">0</p>
</div>

<div class="card">
<h3>Closed Tickets</h3>
<p id="closedTickets">0</p>
</div>

</div>

<!-- TICKET TABLE -->

<div class="form-section">

<h2 style="margin-bottom:20px;">
Live Service Tickets
</h2>

<table>

<thead>

<tr>

<th>Ticket ID</th>
<th>Customer</th>
<th>Issue</th>
<th>Status</th>
<th>Engineer</th>

</tr>

</thead>

<tbody id="ticketTable">

</tbody>

</table>

</div>

</div>

<script>

/* GOOGLE SHEET JSON API */

const SHEET_URL =
"https://opensheet.elk.sh/2PACX-1vS_heclkI8_qaIdp8Bx1vA140Y54Xf6t44OJg9IzV4ozxS7Hwtkosc_ERJGdEKny2_nT4NmXOZtzu3w/Sheet1";

async function loadTickets(){

const response = await fetch(SHEET_URL);

const data = await response.json();

const table =
document.getElementById("ticketTable");

table.innerHTML = "";

let openCount = 0;
let pendingCount = 0;
let closedCount = 0;

data.forEach(ticket => {

const status =
(ticket.Status || "").toLowerCase();

if(status === "open"){
openCount++;
}

if(status === "pending"){
pendingCount++;
}

if(status === "closed"){
closedCount++;
}

table.innerHTML += `

<tr>

<td>${ticket["Ticket ID"] || ""}</td>

<td>${ticket.Customer || ""}</td>

<td>${ticket.Issue || ""}</td>

<td>

<span class="status ${status}">
${ticket.Status || ""}

</span>

</td>

<td>${ticket.Engineer || ""}</td>

</tr>

`;

});

document.getElementById("totalTickets").innerText =
data.length;

document.getElementById("openTickets").innerText =
openCount;

document.getElementById("pendingTickets").innerText =
pendingCount;

document.getElementById("closedTickets").innerText =
closedCount;

}

loadTickets();

</script>

</body>
</html>
```

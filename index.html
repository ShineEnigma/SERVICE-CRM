```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service CRM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f3f4f6;
}

.sidebar{
width:240px;
height:100vh;
background:#111827;
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
margin-bottom:30px;
color:#00c3ff;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:15px;
margin-bottom:10px;
background:#1f2937;
border-radius:8px;
cursor:pointer;
}

.main{
margin-left:240px;
padding:20px;
width:100%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
}

.form-section{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:30px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

input, select{
padding:12px;
border:1px solid #ccc;
border-radius:6px;
width:100%;
}

button{
padding:12px 20px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

th{
background:#111827;
color:white;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #ddd;
}

.status{
padding:5px 10px;
border-radius:5px;
color:white;
font-size:12px;
}

.open{
background:red;
}

.pending{
background:orange;
}

.progress{
background:blue;
}

.closed{
background:green;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>SERVICE CRM</h2>

<ul>
<li>Dashboard</li>
<li>Customers</li>
<li>Tickets</li>
<li>Reports</li>
</ul>
</div>

<div class="main">

<h1 style="margin-bottom:20px;">Service CRM Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Tickets</h3>
<p id="totalTickets">0</p>
</div>

<div class="card">
<h3>Open Tickets</h3>
<p id="openTickets">0</p>
</div>

<div class="card">
<h3>Closed Tickets</h3>
<p id="closedTickets">0</p>
</div>

</div>

<div class="form-section">

<h2>Create Customer</h2>

<div class="form-grid">

<input type="text" id="customerName" placeholder="Customer Name">

<input type="text" id="contactNumber" placeholder="Contact Number">

<input type="text" id="location" placeholder="Location">

</div>

<button onclick="addCustomer()">
Add Customer
</button>

</div>

<div class="form-section">

<h2>Create Service Ticket</h2>

<div class="form-grid">

<input type="text" id="ticketCustomer" placeholder="Customer Name">

<input type="text" id="issue" placeholder="Issue">

<select id="status">

<option value="Open">Open</option>
<option value="Pending">Pending</option>
<option value="In Progress">In Progress</option>
<option value="Closed">Closed</option>

</select>

<input type="text" id="engineer" placeholder="Engineer">

</div>

<button onclick="addTicket()">
Create Ticket
</button>

</div>

<h2>Recent Tickets</h2>

<table>

<thead>

<tr>
<th>ID</th>
<th>Customer</th>
<th>Issue</th>
<th>Status</th>
<th>Engineer</th>
</tr>

</thead>

<tbody id="ticketTable">

</tbody>

</table>

</div>

<script>

let tickets = JSON.parse(localStorage.getItem("tickets")) || [];

function addCustomer(){

alert("Customer Added Successfully");

}

function addTicket(){

const customer =
document.getElementById("ticketCustomer").value;

const issue =
document.getElementById("issue").value;

const status =
document.getElementById("status").value;

const engineer =
document.getElementById("engineer").value;

const ticket = {

id: "SRV-" + (tickets.length + 1),
customer,
issue,
status,
engineer

};

tickets.push(ticket);

localStorage.setItem(
"tickets",
JSON.stringify(tickets)
);

displayTickets();

}

function displayTickets(){

const table =
document.getElementById("ticketTable");

table.innerHTML = "";

let openCount = 0;
let closedCount = 0;

tickets.forEach(ticket => {

if(ticket.status === "Open"){
openCount++;
}

if(ticket.status === "Closed"){
closedCount++;
}

table.innerHTML += `

<tr>

<td>${ticket.id}</td>

<td>${ticket.customer}</td>

<td>${ticket.issue}</td>

<td>
<span class="status">
${ticket.status}
</span>
</td>

<td>${ticket.engineer}</td>

</tr>

`;

});

document.getElementById("totalTickets").innerText =
tickets.length;

document.getElementById("openTickets").innerText =
openCount;

document.getElementById("closedTickets").innerText =
closedCount;

}

displayTickets();

</script>

</body>
</html>
```

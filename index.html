<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service CRM V2</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f4f6f9}
.sidebar{position:fixed;left:0;top:0;width:240px;height:100%;background:#0f172a;color:#fff}
.logo{padding:20px;font-size:24px;font-weight:bold;border-bottom:1px solid #334155}
.menu a{display:block;padding:14px 20px;color:#fff;text-decoration:none}
.menu a:hover{background:#1e293b}
.main{margin-left:240px;padding:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card h2{margin:0}
.section{background:#fff;padding:20px;border-radius:12px;margin-top:20px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input,select,textarea{width:100%;padding:10px;margin:8px 0}
button{background:#2563eb;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
th{background:#0f172a;color:#fff}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">SERVICE CRM</div>
<div class="menu">
<a href="#">Dashboard</a>
<a href="#">Customers</a>
<a href="#">Tickets</a>
<a href="#">Reports</a>
</div>
</div>

<div class="main">
<h1>Dashboard</h1>

<div class="cards">
<div class="card"><p>Open</p><h2 id="openCount">0</h2></div>
<div class="card"><p>In Progress</p><h2 id="progressCount">0</h2></div>
<div class="card"><p>Completed</p><h2 id="completedCount">0</h2></div>
<div class="card"><p>Total</p><h2 id="totalCount">0</h2></div>
</div>

<div class="section">
<h2>Create Service Ticket</h2>

<input type="date" id="date">
<input type="text" id="company" placeholder="Company Name">
<input type="text" id="issue" placeholder="Issue">
<textarea id="solution" placeholder="Solution Provided"></textarea>
<input type="time" id="reported">
<input type="time" id="solved">

<select id="status">
<option>Open</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<button onclick="saveTicket()">Save Ticket</button>
</div>

<div class="section">
<h2>Ticket List</h2>
<table id="ticketTable">
<thead>
<tr>
<th>Date</th>
<th>Company</th>
<th>Issue</th>
<th>Solution</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwUp0OfONSLJ9dQwNnWcRvLYqbubVSQYCILdemAT1yrvPk5-NhVg7072m74yolojN8QPQ/exec";

let tickets=[];

function updateDashboard(){
document.getElementById('openCount').innerText=tickets.filter(t=>t.status==="Open").length;
document.getElementById('progressCount').innerText=tickets.filter(t=>t.status==="In Progress").length;
document.getElementById('completedCount').innerText=tickets.filter(t=>t.status==="Completed").length;
document.getElementById('totalCount').innerText=tickets.length;
}

function renderTable(){
const tbody=document.querySelector("#ticketTable tbody");
tbody.innerHTML="";
tickets.forEach(t=>{
tbody.innerHTML+=`<tr>
<td>${t.date}</td>
<td>${t.company}</td>
<td>${t.issue}</td>
<td>${t.solution}</td>
<td>${t.status}</td>
</tr>`;
});
}

async function saveTicket(){
const ticket={
date:date.value,
companyName:company.value,
issue:issue.value,
solution:solution.value,
reportedTime:reported.value,
solvingTime:solved.value,
status:status.value
};

try{
await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(ticket)});

tickets.push({
date:ticket.date,
company:ticket.companyName,
issue:ticket.issue,
solution:ticket.solution,
status:ticket.status
});

renderTable();
updateDashboard();
alert("Ticket Saved Successfully");
}catch(e){
alert("Error Saving Ticket");
}
}
</script>
</body>
</html>

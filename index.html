```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Service CRM</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:1000px;
margin:auto;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
cursor:pointer;
}

.cards{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
background:#e5e7eb;
padding:15px;
border-radius:8px;
flex:1;
text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h1>Service CRM</h1>

<div class="cards">

<div class="card">
<h3>Open</h3>
<p id="openCount">0</p>
</div>

<div class="card">
<h3>In Progress</h3>
<p id="progressCount">0</p>
</div>

<div class="card">
<h3>Completed</h3>
<p id="completedCount">0</p>
</div>

</div>

<h2>Create Ticket</h2>

<input id="date" type="date">

<input id="companyName"
placeholder="Company Name">

<input id="issue"
placeholder="Issue">

<input id="solution"
placeholder="Solution Provided">

<input id="reportedTime"
type="time">

<input id="solvingTime"
type="time">

<select id="status">
<option>Open</option>
<option>In Progress</option>
<option>Finished</option>
<option>Completed</option>
</select>

<button onclick="saveTicket()">
Save Ticket
</button>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbwUp0OfONSLJ9dQwNnWcRvLYqbubVSQYCILdemAT1yrvPk5-NhVg7072m74yolojN8QPQ/exec";

async function saveTicket(){

const payload = {

date:
document.getElementById("date").value,

companyName:
document.getElementById("companyName").value,

issue:
document.getElementById("issue").value,

solution:
document.getElementById("solution").value,

reportedTime:
document.getElementById("reportedTime").value,

solvingTime:
document.getElementById("solvingTime").value,

status:
document.getElementById("status").value

};

try{

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(payload)
});

alert("Ticket Saved Successfully");

}catch(error){

alert("Error Saving Ticket");

}

}

</script>

</body>
</html>
```
